<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <title>Tenor GIF picker</title>
    <link rel="stylesheet" href="picker.css" />
  </head>
  <body>
    <div class="app" role="dialog" aria-label="Tenor GIF picker">
      <header class="bar">
        <div class="search">
          <svg class="search__icon" viewBox="0 0 16 16" aria-hidden="true">
            <path
              d="M7 1a6 6 0 1 0 3.72 10.72l3.28 3.28 1.06-1.06-3.28-3.28A6 6 0 0 0 7 1Zm0 1.5a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Z"
              fill="currentColor"
            />
          </svg>
          <input
            id="query"
            class="search__input"
            type="text"
            placeholder="Search Tenor"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            aria-label="Search Tenor for GIFs"
          />
          <button id="clear" class="search__clear" type="button" aria-label="Clear search" hidden>
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                d="M4.4 3.34 8 6.94l3.6-3.6 1.06 1.06L9.06 8l3.6 3.6-1.06 1.06L8 9.06l-3.6 3.6-1.06-1.06L6.94 8l-3.6-3.6Z"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>
        <button id="close" class="iconbtn" type="button" aria-label="Close GIF picker">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path
              d="M4.4 3.34 8 6.94l3.6-3.6 1.06 1.06L9.06 8l3.6 3.6-1.06 1.06L8 9.06l-3.6 3.6-1.06-1.06L6.94 8l-3.6-3.6Z"
              fill="currentColor"
            />
          </svg>
        </button>
      </header>

      <main class="body">
        <!-- Held at opacity 0 until the in-frame script handshakes. This is the
             actual guarantee against a flash of un-surgered tenor; the manifest
             CSS timing is only an optimisation. -->
        <iframe
          id="frame"
          class="frame"
          title="Tenor search results"
          allow="clipboard-write"
          referrerpolicy="no-referrer"
        ></iframe>

        <section id="pane-idle" class="pane pane--scroll">
          <div id="recents-block" class="block" hidden>
            <div class="block__head">
              <h2 class="block__title">Recent</h2>
              <button id="clear-recents" class="linkbtn" type="button">Clear</button>
            </div>
            <div id="recents" class="chips"></div>
          </div>
          <div class="block">
            <h2 class="block__title">Try</h2>
            <div id="suggestions" class="chips"></div>
          </div>
          <p class="hint">Pick a GIF and its link lands on your clipboard.</p>
        </section>

        <section id="pane-loading" class="pane" hidden>
          <div id="skeleton" class="skeleton" aria-hidden="true"></div>
          <p id="slow-hint" class="pane__hint" hidden>Still loading…</p>
        </section>

        <section id="pane-empty" class="pane pane--center" hidden>
          <div class="state">
            <div class="state__emoji" aria-hidden="true">🔍</div>
            <h2 class="state__title">No GIFs found</h2>
            <p class="state__body" id="empty-body">Nothing matched that search.</p>
            <div id="empty-chips" class="chips chips--center"></div>
          </div>
        </section>

        <section id="pane-error" class="pane pane--center" hidden>
          <div class="state">
            <div class="state__emoji" aria-hidden="true">🚫</div>
            <h2 class="state__title">Can't load Tenor here</h2>
            <p class="state__body" id="error-body">
              This page's security policy may be blocking the picker.
            </p>
            <div class="state__actions">
              <button id="open-tab" class="btn btn--primary" type="button">
                Open Tenor in a new tab
              </button>
              <button id="retry" class="btn" type="button">Retry</button>
            </div>
          </div>
        </section>

        <section id="pane-offline" class="pane pane--center" hidden>
          <div class="state">
            <div class="state__emoji" aria-hidden="true">📡</div>
            <h2 class="state__title">You're offline</h2>
            <p class="state__body">The picker will retry when your connection is back.</p>
            <div class="state__actions">
              <button id="retry-offline" class="btn" type="button">Retry now</button>
            </div>
          </div>
        </section>
      </main>

      <div id="notice" class="notice" hidden>
        <span id="notice-text"></span>
        <button id="notice-dismiss" class="linkbtn" type="button">Dismiss</button>
      </div>

      <!-- Tier 4 of the clipboard ladder. Always reachable, so even a lying
           success leaves the user one Cmd+C from the right answer. -->
      <div id="manual" class="manual" hidden>
        <label class="manual__label" for="manual-url">Couldn't copy — press ⌘/Ctrl + C</label>
        <input id="manual-url" class="manual__input" type="text" readonly />
      </div>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </div>

    <script src="picker.js"></script>
  </body>
</html>
